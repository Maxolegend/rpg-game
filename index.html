<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            padding: 30px;
            border: 2px solid #00d4ff;
        }

        h1 {
            text-align: center;
            color: #00d4ff;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .game-area {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background: rgba(15, 52, 96, 0.8);
            border: 2px solid #00d4ff;
            border-radius: 8px;
            padding: 15px;
        }

        h2 {
            color: #00d4ff;
            margin-bottom: 15px;
            border-bottom: 1px solid #ff6b9d;
            padding-bottom: 10px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }

        .stat-label {
            color: #ff6b9d;
            font-weight: bold;
        }

        .stat-value {
            color: #00d4ff;
        }

        .hp-bar, .mana-bar {
            width: 100%;
            height: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }

        .hp-fill {
            height: 100%;
            background: #ff6b6b;
            transition: width 0.3s;
        }

        .mana-fill {
            height: 100%;
            background: #00d4ff;
            transition: width 0.3s;
        }

        .story-text {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 4px;
            line-height: 1.6;
            min-height: 150px;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        button {
            flex: 1;
            min-width: 100px;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 14px;
        }

        .btn-primary {
            background: #00d4ff;
            color: #000;
        }

        .btn-primary:hover {
            background: #00aaff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
        }

        .btn-danger {
            background: #ff6b6b;
            color: #fff;
        }

        .btn-danger:hover {
            background: #ff4444;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.5);
        }

        .btn-success {
            background: #6bff6b;
            color: #000;
        }

        .btn-success:hover {
            background: #44ff44;
            box-shadow: 0 0 15px rgba(107, 255, 107, 0.5);
        }

        .btn-warning {
            background: #ffaa00;
            color: #000;
        }

        .btn-warning:hover {
            background: #ff9900;
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.5);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .log {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 12px;
        }

        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 2px solid #00d4ff;
            padding-left: 10px;
        }

        .log-entry.damage {
            color: #ff6b6b;
        }

        .log-entry.heal {
            color: #6bff6b;
        }

        @media (max-width: 900px) {
            .game-area {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ DUNGEON QUEST ⚔️</h1>

        <div class="game-area">
            <!-- Left Panel -->
            <div class="panel">
                <h2>📊 Stats</h2>
                <div class="stat-row">
                    <span class="stat-label">Name:</span>
                    <span class="stat-value" id="name">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Level:</span>
                    <span class="stat-value" id="level">1</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">HP:</span>
                    <span class="stat-value" id="hp">100/100</span>
                </div>
                <div class="hp-bar">
                    <div class="hp-fill" id="hpBar" style="width: 100%"></div>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Mana:</span>
                    <span class="stat-value" id="mana">50/50</span>
                </div>
                <div class="mana-bar">
                    <div class="mana-fill" id="manaBar" style="width: 100%"></div>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Gold:</span>
                    <span class="stat-value" id="gold">0</span>
                </div>
            </div>

            <!-- Center Panel -->
            <div class="panel">
                <h2>📖 Story</h2>
                <div class="story-text" id="story">
                    Welcome to Dungeon Quest! Click Start Game to begin your adventure.
                </div>
                <div class="buttons" id="buttons">
                    <button class="btn-primary" onclick="gameStart()">START GAME</button>
                </div>
            </div>

            <!-- Right Panel -->
            <div class="panel">
                <h2>👹 Enemy</h2>
                <div id="enemyInfo">
                    No enemy encountered yet.
                </div>
                <h2 style="margin-top: 20px;">Battle Log</h2>
                <div class="log" id="log">
                    <div class="log-entry">Game ready...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Game State
        let gameState = {
            active: false,
            inBattle: false,
            player: {
                name: 'Adventurer',
                level: 1,
                hp: 100,
                maxHp: 100,
                mana: 50,
                maxMana: 50,
                attack: 10,
                defense: 5,
                gold: 0,
                exp: 0,
                expToLevel: 100
            },
            enemy: null
        };

        const enemies = [
            { name: 'Goblin', hp: 30, attack: 5, defense: 2, exp: 25, gold: 10 },
            { name: 'Orc', hp: 50, attack: 8, defense: 3, exp: 50, gold: 25 },
            { name: 'Troll', hp: 80, attack: 12, defense: 5, exp: 100, gold: 50 },
            { name: 'Shadow Knight', hp: 120, attack: 15, defense: 6, exp: 150, gold: 100 },
            { name: 'Dragon', hp: 150, attack: 20, defense: 8, exp: 250, gold: 150 }
        ];

        function updateUI() {
            const p = gameState.player;
            document.getElementById('name').textContent = p.name;
            document.getElementById('level').textContent = p.level;
            document.getElementById('hp').textContent = p.hp + '/' + p.maxHp;
            document.getElementById('mana').textContent = p.mana + '/' + p.maxMana;
            document.getElementById('gold').textContent = p.gold;
            document.getElementById('hpBar').style.width = (p.hp / p.maxHp * 100) + '%';
            document.getElementById('manaBar').style.width = (p.mana / p.maxMana * 100) + '%';
        }

        function log(message, type = 'normal') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            entry.textContent = message;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function gameStart() {
            gameState.active = true;
            document.getElementById('story').textContent = 'You awaken in a dark dungeon. Your only hope is to fight your way out. Choose your action wisely!';
            showMainMenu();
            updateUI();
            log('Game started!');
        }

        function showMainMenu() {
            const buttons = document.getElementById('buttons');
            buttons.innerHTML = `
                <button class="btn-danger" onclick="startBattle()">Explore Dungeon</button>
                <button class="btn-warning" onclick="visitShop()">Visit Shop</button>
                <button class="btn-success" onclick="restPlayer()">Rest</button>
            `;
        }

        function startBattle() {
            gameState.inBattle = true;
            const randomEnemy = enemies[Math.floor(Math.random() * enemies.length)];
            gameState.enemy = { ...randomEnemy, currentHp: randomEnemy.hp };
            
            log('You encountered a ' + gameState.enemy.name + '!', 'damage');
            updateEnemyInfo();
            
            const buttons = document.getElementById('buttons');
            buttons.innerHTML = `
                <button class="btn-danger" onclick="playerAttack()">Attack</button>
                <button class="btn-warning" onclick="playerCast()">Cast Spell</button>
                <button class="btn-success" onclick="playerHeal()">Heal</button>
            `;
        }

        function playerAttack() {
            const damage = gameState.player.attack + Math.random() * 5;
            gameState.enemy.currentHp -= damage;
            log('You deal ' + Math.floor(damage) + ' damage!', 'damage');
            
            if (gameState.enemy.currentHp <= 0) {
                endBattle();
                return;
            }
            
            updateEnemyInfo();
            setTimeout(enemyAttack, 500);
        }

        function playerCast() {
            if (gameState.player.mana < 20) {
                log('Not enough mana!');
                return;
            }
            
            gameState.player.mana -= 20;
            const damage = gameState.player.attack * 1.5;
            gameState.enemy.currentHp -= damage;
            log('You cast Fireball for ' + Math.floor(damage) + ' damage!', 'damage');
            
            if (gameState.enemy.currentHp <= 0) {
                endBattle();
                return;
            }
            
            updateUI();
            updateEnemyInfo();
            setTimeout(enemyAttack, 500);
        }

        function playerHeal() {
            if (gameState.player.mana < 15) {
                log('Not enough mana!');
                return;
            }
            
            gameState.player.mana -= 15;
            gameState.player.hp = Math.min(gameState.player.maxHp, gameState.player.hp + 30);
            log('You heal for 30 HP!', 'heal');
            
            updateUI();
            setTimeout(enemyAttack, 500);
        }

        function enemyAttack() {
            const damage = gameState.enemy.attack + Math.random() * 5;
            gameState.player.hp -= damage;
            log(gameState.enemy.name + ' deals ' + Math.floor(damage) + ' damage!');
            
            if (gameState.player.hp <= 0) {
                endBattle(false);
                return;
            }
            
            updateUI();
        }

        function endBattle(won = true) {
            gameState.inBattle = false;
            
            if (won) {
                log('You defeated the ' + gameState.enemy.name + '!', 'heal');
                gameState.player.gold += gameState.enemy.gold;
                gameState.player.exp += gameState.enemy.exp;
                log('Gained ' + gameState.enemy.exp + ' EXP and ' + gameState.enemy.gold + ' Gold!');
            } else {
                log('You were defeated! Game Over.', 'damage');
                gameState.active = false;
                document.getElementById('buttons').innerHTML = '<button class="btn-primary" onclick="location.reload()">Play Again</button>';
                return;
            }
            
            gameState.enemy = null;
            updateUI();
            updateEnemyInfo();
            showMainMenu();
        }

        function updateEnemyInfo() {
            if (!gameState.enemy) {
                document.getElementById('enemyInfo').innerHTML = 'No enemy encountered yet.';
                return;
            }
            
            const e = gameState.enemy;
            const hpPercent = (e.currentHp / e.hp) * 100;
            document.getElementById('enemyInfo').innerHTML = `
                <div style="color: #ff6b9d; font-weight: bold; font-size: 18px;">${e.name}</div>
                <div style="margin-top: 10px;">
                    <div style="color: #00d4ff;">HP: ${Math.max(0, Math.floor(e.currentHp))}/${e.hp}</div>
                    <div class="hp-bar"><div class="hp-fill" style="width: ${hpPercent}%"></div></div>
                    <div style="color: #ff6b9d; margin-top: 10px;">Attack: ${e.attack}</div>
                    <div style="color: #ff6b9d;">Defense: ${e.defense}</div>
                </div>
            `;
        }

        function visitShop() {
            document.getElementById('story').textContent = '🏪 SHOP - Buy Equipment and Potions';
            const buttons = document.getElementById('buttons');
            buttons.innerHTML = `
                <button class="btn-primary" onclick="buyItem(50, 'Iron Sword')">Buy Sword (50g)</button>
                <button class="btn-primary" onclick="buyItem(25, 'Potion')">Buy Potion (25g)</button>
                <button class="btn-warning" onclick="showMainMenu()">Back</button>
            `;
        }

        function buyItem(cost, name) {
            if (gameState.player.gold >= cost) {
                gameState.player.gold -= cost;
                if (name === 'Potion') {
                    gameState.player.hp = Math.min(gameState.player.maxHp, gameState.player.hp + 50);
                }
                log('Purchased ' + name + '!');
                updateUI();
            } else {
                log('Not enough gold!');
            }
        }

        function restPlayer() {
            gameState.player.hp = gameState.player.maxHp;
            gameState.player.mana = gameState.player.maxMana;
            log('You rest and recover completely!', 'heal');
            updateUI();
        }

        // Initialize
        updateUI();
    </script>
</body>
</html>
